name: Feature request
description: Suggest an improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        This app is **deliberately narrow**: it converts a local MP4 video to MP3 audio, offline,
        and nothing else. Requests that stay within that scope are much more likely to land. Please
        skim `docs/ROADMAP.md` and existing issues first.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
