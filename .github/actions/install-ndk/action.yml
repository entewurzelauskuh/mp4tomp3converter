name: Install pinned NDK & CMake
description: >
  sdkmanager-installs the exact NDK and CMake versions the native LAME build requires.
  This is the single source of truth for those pins in CI — keep it in lockstep with
  app/build.gradle.kts (`ndkVersion` and the `cmake { version }` block). The NDK is
  r30-beta1; if a hosted runner can no longer fetch a beta package, bump the pin
  deliberately in the build rather than freezing a stale copy here.
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
        # Accept all pending SDK licenses (idempotent). `yes` can die by SIGPIPE when sdkmanager
        # exits first; under `pipefail` that would fail the line, so this best-effort step alone
        # is guarded with `|| true`.
        yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
        # Licenses are accepted now, so this install does not prompt — run it without `yes` (no
        # SIGPIPE race) and without swallowing output, so a genuine failure fails the step loudly
        # instead of silently leaving the NDK missing.
        "$SDKMANAGER" "ndk;30.0.14904198" "cmake;4.1.2"
